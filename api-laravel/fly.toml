# fly.toml app configuration file generated for Lotaya Shwe Oh
# See https://fly.io/docs/reference/configuration/

app = 'lotaya-shwe-oh'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_ENV = 'production'
  APP_DEBUG = 'false'
  LOG_CHANNEL = 'stderr'
  SESSION_DRIVER = 'cookie'
  CACHE_STORE = 'file'
  QUEUE_CONNECTION = 'sync'

[http_service]
  internal_port = 10000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/health"
    port = 10000
    timeout = "10s"
