# Z.com Private Hosting — Nginx site config
# Place in: /www/server/panel/vhost/nginx/api.yourdomain.com.conf (aaPanel)
# Or: /etc/nginx/sites-available/lotaya

server {
    listen 80;
    listen [::]:80;
    server_name api.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.yourdomain.com;

    # aaPanel: SSL paths auto-managed by Let's Encrypt panel
    ssl_certificate     /www/server/panel/vhost/cert/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/api.yourdomain.com/privkey.pem;

    root /www/wwwroot/lotaya/api-laravel/public;
    index index.php;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/tmp/php-cgi-83.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# Optional: exchange subdomain → same app
# server {
#     listen 443 ssl http2;
#     server_name exchange.yourdomain.com;
#     return 301 https://api.yourdomain.com/exchange;
# }
